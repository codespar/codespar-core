name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Lock file drift check
        run: |
          if grep -qE '"packages/[^"]+/node_modules/@codespar/' package-lock.json; then
            echo "::error::package-lock.json contains nested @codespar/* installs; workspace cross-deps must resolve via symlinks, not tarballs. Run 'rm package-lock.json && npm install' locally, then commit the regenerated lock."
            grep -nE '"packages/[^"]+/node_modules/@codespar/' package-lock.json
            exit 1
          fi
          cp package-lock.json /tmp/committed-lock.json
          npm install --package-lock-only --ignore-scripts --no-audit
          if ! diff -q /tmp/committed-lock.json package-lock.json >/dev/null; then
            echo "::error::package-lock.json is not in sync with package.json files. Run 'npm install' locally and commit the regenerated package-lock.json."
            echo "::group::diff (first 100 lines)"
            diff /tmp/committed-lock.json package-lock.json | head -100
            echo "::endgroup::"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build, typecheck, and test
        run: npx turbo run build typecheck test

      - name: Security audit
        run: npm audit --omit=dev

