name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Lock file drift check
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit
          if ! git diff --exit-code --quiet -- package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json files."
            echo "::error::Run 'npm install' locally and commit the regenerated package-lock.json."
            echo "::group::diff"
            git --no-pager diff -- package-lock.json
            echo "::endgroup::"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build, typecheck, and test
        run: npx turbo run build typecheck test

      - name: Security audit
        run: npm audit --omit=dev

