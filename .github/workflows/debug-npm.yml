name: Debug NPM Token

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test token with raw curl (same as local)
        run: |
          echo "Token length: ${#TOKEN}"
          echo "Token first 10 chars: ${TOKEN:0:10}"
          echo "Token last 4 chars: ${TOKEN: -4}"
          echo ""
          echo "=== curl with Bearer ==="
          curl -sS -H "Authorization: Bearer $TOKEN" https://registry.npmjs.org/-/whoami
          echo ""
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
