name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm for OIDC
        # OIDC trusted publishing requires npm 11.5.1+; Node 22 ships 10.9.x.
        run: npm install -g npm@latest

      - name: OIDC availability check
        # Assert that the id-token endpoint is wired and log the CLI
        # versions in use.
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is empty — id-token: write permission is not wired."
            exit 1
          fi
          echo "ACTIONS_ID_TOKEN_REQUEST_URL is set"
          echo "npm  --version: $(npm --version)"
          echo "node --version: $(node --version)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx turbo run build

      - name: Test
        run: npx turbo run test

      - name: Publish all packages
        run: |
          # Bash's "exit on error" is off for the loop body so one bad package
          # doesn't prevent the others from publishing. Real failures are
          # accumulated in `failed_pkgs` and surfaced as a non-zero exit at
          # the end so the workflow's status reflects ground truth.
          set +e
          failed_pkgs=()
          lagging_pkgs=()
          # `ok_pkgs` covers both true publishes and idempotent
          # already-at-this-version soft-passes. We need a non-zero
          # count here to distinguish "the run actually accepted
          # something" from "every package ended in failed/lagging,
          # which the 0.10.0 silent-fail incident showed is what
          # npm/cli#9268 (auth rejection masquerading as 404-PUT)
          # looks like across an entire scope."
          ok_pkgs=()
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              pkg_name=$(node -p "require('./$dir/package.json').name")
              echo ""
              echo "::group::Publishing $pkg_name"
              cd "$dir"
              # `"private": true` is the standard npm "do not publish" flag — a
              # package held back (built + tested in the monorepo, not yet
              # released). Skip it cleanly so the run stays green; flip the flag
              # off when it's ready to ship on the next tag.
              if [ "$(node -p "require('./package.json').private === true" 2>/dev/null || echo false)" = "true" ]; then
                echo "↷ $pkg_name is private — held, skipping"
                echo "::endgroup::"
                cd "$GITHUB_WORKSPACE"
                continue
              fi
              out=$(npm publish --access public 2>&1)
              code=$?
              if [ $code -ne 0 ]; then
                # Three classes of non-zero exit from `npm publish`:
                #
                # 1. "You cannot publish over the previously published
                #    versions" — version already in registry. Idempotent
                #    re-runs of the same tag land here; soft-pass.
                #
                # 2. "404 Not Found - PUT" on a scope we own — npm's
                #    misleading shape for "publish succeeded but registry
                #    reflection lags ~5min." See ops note:
                #    feedback/npm publish 404 on first-time scoped package is
                #    often a lie. Soft-pass with a warning so the operator
                #    knows to re-verify with `npm view` after the lag window.
                #
                # 3. Anything else — real failure (bad token scope, malformed
                #    tarball, network, registry outage). Surface loudly +
                #    accumulate so the workflow exits non-zero.
                if echo "$out" | grep -q "You cannot publish over the previously published versions"; then
                  echo "✓ $pkg_name already at this version, skipping"
                  ok_pkgs+=("$pkg_name")
                elif echo "$out" | grep -qE "404 Not Found.*PUT.*registry\.npmjs\.org/@codespar"; then
                  # 404-PUT is only plausibly "propagation lag" when the
                  # package has never been published before — npm's
                  # first-publish path occasionally races registry-reflection
                  # for new scoped packages. When a prior version exists on
                  # the registry, 404-PUT cannot be lag; it's a real failure
                  # (auth scope, registry outage, etc.) and must surface.
                  prior_version=$(cd "$GITHUB_WORKSPACE" && npm view "$pkg_name" version 2>/dev/null || true)
                  if [ -z "$prior_version" ]; then
                    echo "⚠ $pkg_name returned 404-PUT on first publish — possible propagation lag (verify with 'npm view $pkg_name' in 10 min)"
                    lagging_pkgs+=("$pkg_name")
                  else
                    echo "✗ $pkg_name FAILED with 404-PUT but prior version $prior_version exists on the registry — this is NOT propagation lag:"
                    echo "$out"
                    failed_pkgs+=("$pkg_name")
                  fi
                else
                  echo "✗ $pkg_name FAILED:"
                  echo "$out"
                  failed_pkgs+=("$pkg_name")
                fi
              else
                echo "$out"
                echo "✓ $pkg_name published"
                ok_pkgs+=("$pkg_name")
              fi
              echo "::endgroup::"
              cd "$GITHUB_WORKSPACE"
            fi
          done

          echo ""
          echo "=== Publish summary ==="
          if [ ${#lagging_pkgs[@]} -gt 0 ]; then
            echo "⚠ ${#lagging_pkgs[@]} package(s) returned 404-PUT — propagation lag suspected:"
            printf '   - %s\n' "${lagging_pkgs[@]}"
            echo "  Verify each with: npm view <pkg> version"
          fi
          if [ ${#failed_pkgs[@]} -gt 0 ]; then
            echo "✗ ${#failed_pkgs[@]} package(s) FAILED for non-recoverable reasons:"
            printf '   - %s\n' "${failed_pkgs[@]}"
            exit 1
          fi
          # Hard-fail rule 1: multi-package 404-PUT in a single run.
          # Real registry propagation lag affects one package at a time
          # (typically the first publish of a brand-new package name).
          # Lag affecting 2+ scoped packages in one run is implausible —
          # the 0.10.0 silent-fail incident showed all 17 packages
          # 404-PUT'd as the npm/cli#9268 auth rejection masquerading
          # as propagation lag, and the previous heuristic swallowed
          # every one of them as soft-pass. Escalate to hard failure.
          if [ ${#lagging_pkgs[@]} -ge 2 ]; then
            echo "✗ ${#lagging_pkgs[@]} package(s) returned 404-PUT in one run — registry-wide propagation lag across a whole scope does not happen."
            echo "  This pattern matches npm/cli#9268: the registry rejects the token (likely a granular access token with bypass_2fa: true) and the npm CLI reports the 403 as a misleading 404-PUT."
            echo "  Failing the run loudly rather than claiming success."
            exit 1
          fi
          # Hard-fail rule 2: zero accepted publishes. If the run ended
          # with every publishable package in either failed or lagging
          # state and nothing was actually accepted by the registry,
          # the workflow must not exit green — that is exactly the
          # 0.10.0 silent-fail shape.
          if [ ${#ok_pkgs[@]} -eq 0 ] && [ ${#lagging_pkgs[@]} -gt 0 ]; then
            echo "✗ Zero packages were accepted by the registry in this run (${#lagging_pkgs[@]} lagging, ${#failed_pkgs[@]} failed). Refusing to exit green."
            exit 1
          fi
          echo "✓ All publishable packages succeeded (or were already current)"
