name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          echo "always-auth=true" >> ~/.npmrc
          echo "whoami:"
          npm whoami
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx turbo run build

      - name: Test
        run: npx turbo run test

      - name: Publish all packages
        run: |
          set +e  # Don't fail the job on individual publish errors
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ]; then
              pkg_name=$(node -p "require('./$dir/package.json').name")
              echo ""
              echo "::group::Publishing $pkg_name"
              cd "$dir"
              out=$(npm publish --access public 2>&1)
              code=$?
              if [ $code -ne 0 ]; then
                # Treat "version already exists" as success so republishing
                # the same tag doesn't break the workflow — but surface any
                # other failure mode loudly for debugging.
                if echo "$out" | grep -q "You cannot publish over the previously published versions"; then
                  echo "✓ $pkg_name already at this version, skipping"
                else
                  echo "✗ $pkg_name FAILED:"
                  echo "$out"
                fi
              else
                echo "$out"
                echo "✓ $pkg_name published"
              fi
              echo "::endgroup::"
              cd "$GITHUB_WORKSPACE"
            fi
          done
